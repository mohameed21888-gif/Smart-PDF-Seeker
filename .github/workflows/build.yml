name: Build Smart PDF APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git ffmpeg libffi-dev libssl-dev pkg-config cmake zlib1g-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install Cython==3.0.10 buildozer==1.5.0

    - name: Build APK with Buildozer
      run: |
        yes | buildozer -v android debug
      env:
        TERM: xterm

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Smart-PDF-App
        path: bin/*.apk